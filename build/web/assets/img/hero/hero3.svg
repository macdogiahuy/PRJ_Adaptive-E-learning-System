  </g>
  <g transform="translate(100,120)">
    <text x="0" y="0" font-size="48" fill="#fff" font-family="Georgia, serif" opacity="0.98">Start building skills</text>
    <text x="0" y="60" font-size="24" fill="#e6edf3" opacity="0.9">Mentor-led courses & hands-on labs</text>
  </g>
</svg>