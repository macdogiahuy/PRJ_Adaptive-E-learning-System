# Database Configuration Template
# Copy actual values from env.properties.example and update

# Database URL - update with your SQL Server setup
DB_URL=jdbc:sqlserver://localhost\\SQLEXPRESS;databaseName=CourseHubDB;encrypt=true;trustServerCertificate=true;

# Database credentials - update with your actual credentials
DB_USER=your_username_here
DB_PASSWORD=your_password_here

# Google OAuth Configuration - update with your actual OAuth credentials
GOOGLE_CLIENT_ID=your_google_client_id_here
GOOGLE_CLIENT_SECRET=your_google_client_secret_here
REDIRECT_URI=http://localhost:8080/Adaptive_Elearning/oauth2callback