version: "3.9"

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-CU14-ubuntu-22.04
    container_name: adaptive-mssql
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD}"
      MSSQL_COLLATION: "${MSSQL_COLLATION:-SQL_Latin1_General_CP1_CI_AS}"
    volumes:
      - mssql_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - backend

  python-cat:
    build:
      context: .
      dockerfile: deploy/containers/Dockerfile.cat
    container_name: adaptive-cat
    restart: always
    env_file: .env
    environment:
      CAT_DB_SERVER: "${DB_HOST}"
      CAT_DB_PORT: "${DB_PORT}"
      CAT_DB_NAME: "${DB_NAME}"
      CAT_DB_USER: "${DB_USER}"
      CAT_DB_PASSWORD: "${DB_PASSWORD}"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - backend
      - edge

  python-ai:
    build:
      context: .
      dockerfile: deploy/containers/Dockerfile.chat
    container_name: adaptive-ai
    restart: always
    env_file: .env
    environment:
      AI_DB_SERVER: "${DB_HOST}"
      AI_DB_PORT: "${DB_PORT}"
      AI_DB_NAME: "${DB_NAME}"
      AI_DB_USER: "${DB_USER}"
      AI_DB_PASSWORD: "${DB_PASSWORD}"
    depends_on:
      mssql:
        condition: service_healthy
    networks:
      - backend
      - edge

  java-app:
    build:
      context: .
      dockerfile: deploy/containers/Dockerfile.java
    container_name: adaptive-java
    restart: always
    env_file: .env
    environment:
      DB_URL: "jdbc:sqlserver://${DB_HOST}:${DB_PORT};databaseName=${DB_NAME};encrypt=true;trustServerCertificate=true;"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      GOOGLE_REDIRECT_URI: "${GOOGLE_REDIRECT_URI}"
    depends_on:
      mssql:
        condition: service_healthy
      python-cat:
        condition: service_started
    networks:
      - backend
      - edge

  nginx:
    image: nginx:1.27-alpine
    container_name: adaptive-nginx
    restart: always
    depends_on:
      java-app:
        condition: service_started
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/certs:/etc/ssl/custom:ro
      - nginx_cache:/var/cache/nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - edge

volumes:
  mssql_data:
  nginx_cache:

networks:
  backend:
    driver: bridge
  edge:
    driver: bridge

